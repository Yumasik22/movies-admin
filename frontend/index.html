<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Movies Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- СТРАНИЦА ЛОГИНА -->
    <div id="loginPage">
        <div class="login-box">
            <h2>Вход в систему</h2>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Логин" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
                <p id="loginError" class="error"></p>
            </form>
        </div>
    </div>

    <!-- ГЛАВНАЯ СТРАНИЦА (скрыта пока не войдём) -->
    <div id="mainPage" class="hidden">

        <!-- САЙДБАР -->
        <div class="sidebar">
            <h2>🎬 Movies</h2>
            <nav>
                <a href="#" onclick="showSection('genres')">Жанры</a>
                <a href="#" onclick="showSection('movies')">Фильмы</a>
                <a href="#" onclick="logout()">Выйти</a>
            </nav>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content">

            <!-- РАЗДЕЛ ЖАНРЫ -->
            <div id="genresSection" class="section">
                <h1>Жанры</h1>
                <form id="genreForm">
                    <input type="hidden" id="genreId">
                    <input type="text" id="genreName" placeholder="Название жанра" required>
                    <input type="text" id="genreDescription" placeholder="Описание">
                    <button type="submit">Сохранить</button>
                    <button type="button" onclick="resetGenreForm()">Отмена</button>
                </form>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Описание</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="genresList"></tbody>
                </table>
            </div>

            <!-- РАЗДЕЛ ФИЛЬМЫ -->
            <div id="moviesSection" class="section hidden">
                <h1>Фильмы</h1>

                <!-- ПОИСК И ФИЛЬТРЫ -->
                <div class="filters">
                    <input type="text" id="searchMovie" placeholder="Поиск по названию" oninput="loadMovies()">
                    <select id="filterGenre" onchange="loadMovies()">
                        <option value="">Все жанры</option>
                    </select>
                    <input type="number" id="yearFrom" placeholder="Год от" onchange="loadMovies()">
                    <input type="number" id="yearTo" placeholder="Год до" onchange="loadMovies()">
                </div>

                <form id="movieForm" enctype="multipart/form-data">
                    <input type="hidden" id="movieId">
                    <input type="text" id="movieTitle" placeholder="Название фильма" required>
                    <textarea id="movieDescription" placeholder="Описание"></textarea>
                    <input type="number" id="movieYear" placeholder="Год выпуска" required>
                    <select id="movieGenre" required>
                        <option value="">Выберите жанр</option>
                    </select>
                    <label>Постер: <input type="file" id="moviePoster" accept="image/*"></label>
                    <label>Трейлер: <input type="file" id="movieTrailer" accept="video/*"></label>
                    <button type="submit">Сохранить</button>
                    <button type="button" onclick="resetMovieForm()">Отмена</button>
                </form>

                <table>
                    <thead>
                        <tr>
                            <th>Постер</th>
                            <th>Название</th>
                            <th>Жанр</th>
                            <th>Год</th>
                            <th>Трейлер</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="moviesList"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
